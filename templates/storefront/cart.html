<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — {{ shop.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .topbar {
            background: {{ shop.theme_color }};
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar a { color: white; text-decoration: none; }
        .topbar h5 { margin: 0; font-size: 1.1rem; }
        .card { border: 1px solid #e5e7eb; border-radius: 12px; }
        .checkout-btn {
            background: {{ shop.theme_color }};
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
        }
        .delivery-msg {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #166534;
        }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <a href="{% url 'storefront' shop.slug %}">
        <i class="bi bi-arrow-left" style="font-size:1.2rem;"></i>
    </a>
    <h5>Your Cart</h5>
</div>

<div class="container py-3">

    <!-- Cart Items -->
    <div class="card p-3 mb-3" id="cart-items">
        <p class="text-muted text-center" id="empty-msg">
            Your cart is empty
        </p>
    </div>

    <!-- Delivery Info -->
    <div class="delivery-msg mb-3" id="delivery-info">
        <i class="bi bi-truck"></i>
        <span id="delivery-text">Add items to see delivery info</span>
    </div>

    <!-- Price Summary -->
    <div class="card p-3 mb-3">
        <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Products Total</span>
            <span id="subtotal">₹0</span>
        </div>
        <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Delivery Charge</span>
            <span id="delivery-charge">₹0</span>
        </div>
        <hr>
        <div class="d-flex justify-content-between fw-bold">
            <span>Grand Total</span>
            <span id="grand-total"
                  style="color:{{ shop.theme_color }}; font-size:1.1rem;">
                ₹0
            </span>
        </div>
    </div>

    <!-- Checkout Button -->
    <a href="{% url 'checkout' shop.slug %}" id="checkout-btn">
        <button class="checkout-btn">
            Proceed to Checkout
            <i class="bi bi-arrow-right"></i>
        </button>
    </a>

</div>

<script>
    const SHOP_SLUG = '{{ shop.slug }}';
    const FREE_ABOVE = {{ shop.delivery_rule.free_delivery_above|default:500 }};
    const CHARGE = {{ shop.delivery_rule.delivery_charge|default:30 }};

    let cart = JSON.parse(
        localStorage.getItem('cart_' + SHOP_SLUG) || '[]'
    );

    function renderCart() {
        const container = document.getElementById('cart-items');
        const emptyMsg  = document.getElementById('empty-msg');

        if (cart.length === 0) {
            emptyMsg.style.display = 'block';
            container.innerHTML = '<p class="text-muted text-center">Your cart is empty</p>';
            updateSummary(0, 0);
            return;
        }

        let html = '';
        let subtotal = 0;

        cart.forEach((item, idx) => {
            const itemTotal = item.price * item.qty;
            subtotal += itemTotal;
            html += `
            <div class="d-flex justify-content-between
                        align-items-center mb-3 pb-3
                        border-bottom">
                <div>
                    <div class="fw-bold">${item.name}</div>
                    <small class="text-muted">₹${item.price} each</small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button onclick="changeQty(${idx}, -1)"
                            class="btn btn-sm btn-outline-secondary"
                            style="width:30px; height:30px; padding:0;">
                        -
                    </button>
                    <span class="fw-bold">${item.qty}</span>
                    <button onclick="changeQty(${idx}, 1)"
                            class="btn btn-sm btn-outline-secondary"
                            style="width:30px; height:30px; padding:0;">
                        +
                    </button>
                    <span class="ms-2 fw-bold">₹${itemTotal.toFixed(2)}</span>
                </div>
            </div>`;
        });

        container.innerHTML = html;
        updateSummary(subtotal);
    }

    function updateSummary(subtotal) {
        let delivery = subtotal >= FREE_ABOVE ? 0 : CHARGE;
        let grand    = subtotal + delivery;

        document.getElementById('subtotal').textContent =
            '₹' + subtotal.toFixed(2);
        document.getElementById('delivery-charge').textContent =
            delivery === 0 ? 'FREE' : '₹' + delivery.toFixed(2);
        document.getElementById('grand-total').textContent =
            '₹' + grand.toFixed(2);

        // Delivery message
        const remaining = FREE_ABOVE - subtotal;
        const delText   = document.getElementById('delivery-text');
        if (subtotal === 0) {
            delText.textContent = 'Add items to see delivery info';
        } else if (delivery === 0) {
            delText.textContent = 'You got FREE delivery!';
        } else {
            delText.textContent =
                `Add ₹${remaining.toFixed(2)} more for FREE delivery!`;
        }
    }

    function changeQty(idx, delta) {
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) cart.splice(idx, 1);
        localStorage.setItem('cart_' + SHOP_SLUG, JSON.stringify(cart));
        renderCart();
    }

    renderCart();
</script>
</body>
</html>
