{% extends 'base.html' %}
{% block title %}Owner Login — LocalShop{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">

        <div class="text-center mb-4">
            <i class="bi bi-shop" style="font-size:3rem; color:#16a34a;"></i>
            <h4 class="mt-2 fw-bold">LocalShop</h4>
            <p class="text-muted">Sign in to your shop dashboard</p>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-500">Username</label>
                        <input type="text" name="username" class="form-control" 
                               placeholder="Enter username" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" 
                               placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-2">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
